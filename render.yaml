services:
  # Backend: FastAPI Web Service (Docker — needs ffmpeg for pydub)
  - type: web
    name: durianai-api
    runtime: docker
    region: singapore
    plan: free
    branch: main
    dockerfilePath: ./backend/Dockerfile
    dockerContext: .
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0

  # Frontend: Static Site
  - type: web
    name: durianai-frontend
    runtime: static
    branch: main
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_URL
        value: https://durianai-api.onrender.com
      - key: NODE_VERSION
        value: 20
