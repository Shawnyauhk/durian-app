services:
  # Backend: FastAPI Web Service
  - type: web
    name: durianai-api
    runtime: python
    region: singapore
    plan: free
    branch: main
    buildCommand: apt-get update -qq && apt-get install -y -qq ffmpeg && pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0

  # Frontend: Static Site
  - type: web
    name: durianai-frontend
    runtime: static
    branch: main
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_URL
        value: https://durianai-api.onrender.com
      - key: NODE_VERSION
        value: 20
